name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '릴리즈 버전 (예: 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller Pillow TypeTreeGeneratorAPI fmod_toolkit archspec numpy scipy fonttools
          pip install --upgrade git+https://github.com/snowyegret23/UnityPy.git

      - name: Build executables
        run: |
          pyinstaller --onefile --name unity_font_replacer `
            --collect-all UnityPy `
            --collect-all TypeTreeGeneratorAPI `
            --collect-all fmod_toolkit `
            --collect-all archspec `
            unity_font_replacer.py

          pyinstaller --onefile --name export_fonts `
            --collect-all UnityPy `
            --collect-all TypeTreeGeneratorAPI `
            --collect-all fmod_toolkit `
            --collect-all archspec `
            export_fonts.py

          pyinstaller --onefile --name unity_font_replacer_en `
            --collect-all UnityPy `
            --collect-all TypeTreeGeneratorAPI `
            --collect-all fmod_toolkit `
            --collect-all archspec `
            unity_font_replacer_en.py

          pyinstaller --onefile --name export_fonts_en `
            --collect-all UnityPy `
            --collect-all TypeTreeGeneratorAPI `
            --collect-all fmod_toolkit `
            --collect-all archspec `
            export_fonts_en.py

          pyinstaller --onefile --name make_sdf `
            --collect-all numpy `
            --collect-all scipy `
            --collect-all fontTools `
            make_sdf.py

          pyinstaller --onefile --name ps5_swizzler `
            --collect-all numpy `
            ps5_swizzler.py

      - name: Prepare release files
        run: |
          mkdir release
          copy dist\unity_font_replacer.exe release\
          copy dist\export_fonts.exe release\
          xcopy KR_ASSETS release\KR_ASSETS\ /E /I
          xcopy Il2CppDumper release\Il2CppDumper\ /E /I
          copy README.md release\
          if (Test-Path CharList_3911.txt) { copy CharList_3911.txt release\ }
          mkdir release_en
          copy dist\unity_font_replacer_en.exe release_en\
          copy dist\export_fonts_en.exe release_en\
          xcopy KR_ASSETS release_en\KR_ASSETS\ /E /I
          xcopy Il2CppDumper release_en\Il2CppDumper\ /E /I
          copy README_EN.md release_en\
          if (Test-Path CharList_3911.txt) { copy CharList_3911.txt release_en\ }
          mkdir release_ps5_swizzler
          copy dist\ps5_swizzler.exe release_ps5_swizzler\
          copy README.md release_ps5_swizzler\
          copy README_EN.md release_ps5_swizzler\
          mkdir release_make_sdf
          copy dist\make_sdf.exe release_make_sdf\
          copy README.md release_make_sdf\
          copy README_EN.md release_make_sdf\
          if (Test-Path CharList_3911.txt) { copy CharList_3911.txt release_make_sdf\ }

      - name: Create ZIP archive
        run: |
          Compress-Archive -Path release\* -DestinationPath Unity_Font_Replacer_v${{ inputs.version }}.zip
          Compress-Archive -Path release_en\* -DestinationPath Unity_Font_Replacer_EN_v${{ inputs.version }}.zip
          Compress-Archive -Path release_ps5_swizzler\* -DestinationPath ps5_swizzler_v${{ inputs.version }}.zip
          Compress-Archive -Path release_make_sdf\* -DestinationPath make_sdf_v${{ inputs.version }}.zip

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v${{ inputs.version }} ${{ github.sha }}
          git push origin v${{ inputs.version }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          draft: true
          files: |
            Unity_Font_Replacer_v${{ inputs.version }}.zip
            Unity_Font_Replacer_EN_v${{ inputs.version }}.zip
            ps5_swizzler_v${{ inputs.version }}.zip
            make_sdf_v${{ inputs.version }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
